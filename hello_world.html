<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* アラートの代わりにカスタムメッセージボックスを使用するためのスタイル */
        #custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1000;
            text-align: center;
        }
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center m-0">

    <div class="text-center p-8 bg-white rounded-2xl shadow-sm border border-gray-200">
        <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-8">
            心理学実験室へようこそ
        </h1>
        
        <button 
            id="start-button"
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition duration-300 ease-in-out transform hover:scale-105 shadow-md active:scale-95"
        >
            実験を開始する
        </button>
    </div>

    <!-- カスタムメッセージボックス（ブラウザのalertの代わり） -->
    <div id="overlay"></div>
    <div id="custom-alert">
        <p class="text-xl font-medium text-gray-800 mb-4">Hello World!</p>
        <button 
            id="close-alert"
            class="bg-gray-200 hover:bg-gray-300 text-gray-800 py-2 px-6 rounded-lg font-semibold"
        >
            閉じる
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('start-button');
            const alertBox = document.getElementById('custom-alert');
            const overlay = document.getElementById('overlay');
            const closeBtn = document.getElementById('close-alert');

            // 実験開始ボタンのクリックイベント
            startBtn.addEventListener('click', () => {
                showAlert();
            });

            // メッセージボックスを閉じるイベント
            closeBtn.addEventListener('click', hideAlert);
            overlay.addEventListener('click', hideAlert);

            function showAlert() {
                alertBox.style.display = 'block';
                overlay.style.display = 'block';
            }

            function hideAlert() {
                alertBox.style.display = 'none';
                overlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>
