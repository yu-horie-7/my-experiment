<!DOCTYPE html>
<html>
<head>
  <title>jsPsych - Red Circle Stimulus</title>
  <!-- Load jsPsych v7 -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <!-- Load html-keyboard-response plugin -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <style>
    /* 1. 背景色を灰色 (#808080) に設定 */
    body {
      background-color: #808080;
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* 2. 直径100pxの赤い円を描画するためのCSS */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: #ff0000; /* 赤色 */
      border-radius: 50%; /* 円形にする */
      margin: 0 auto;
    }

    .instruction {
      margin-top: 20px;
      font-family: Arial, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body></body>
<script>
  /**
   * jsPsychの初期化
   */
  const jsPsych = initJsPsych({
    on_finish: function() {
      // 実験終了時にデータを表示（デバッグ用）
      // jsPsych.data.displayData();
    }
  });

  /**
   * 試行1: 赤い円の提示
   * 仕様: スペースキーが押されるまで表示し続ける
   */
  const circle_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="red-circle"></div>
      <div class="instruction">
        <p>スペースキーを押して終了してください。</p>
      </div>
    `,
    choices: [' '], // スペースキーのみ受け付ける
    data: {
      task: 'display_red_circle'
    }
  };

  /**
   * 試行2: 終了メッセージ
   */
  const end_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="instruction">
        <p>終了しました。</p>
      </div>
    `,
    choices: "NO_KEYS", // キー入力無効
    trial_duration: 2000 // 2秒間表示して終了
  };

  /**
   * タイムラインの作成
   */
  const timeline = [circle_trial, end_trial];

  /**
   * 実験の実行
   */
  jsPsych.run(timeline);
</script>
</html>
