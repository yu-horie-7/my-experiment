<!DOCTYPE html>
<html>
<head>
  <title>jsPsych - Red Circle Stimulus</title>
  <!-- Load jsPsych v7 from CDN -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <!-- Load html-keyboard-response plugin -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <style>
    /* 1. Set background color to gray (#808080) */
    body {
      background-color: #808080;
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* 2. CSS to draw a red circle with 100px diameter */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: #ff0000; /* Red */
      border-radius: 50%; /* Makes it a circle */
      margin: 0 auto;
    }

    .instruction {
      margin-top: 20px;
      font-family: Arial, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body></body>
<script>
  /**
   * Initialize jsPsych
   */
  const jsPsych = initJsPsych({
    on_finish: function() {
      // Display data for debugging if needed
      // jsPsych.data.displayData();
    }
  });

  /**
   * Trial 1: Display red circle
   * Requirement: Continue until Space key is pressed
   */
  const circle_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="red-circle"></div>
      <div class="instruction">
        <p>スペースキーを押して終了してください。</p>
      </div>
    `,
    choices: [' '], // Restrict response to Space key only
    data: {
      task: 'display_red_circle'
    }
  };

  /**
   * Trial 2: End message
   */
  const end_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="instruction">
        <p>終了しました。</p>
      </div>
    `,
    choices: "NO_KEYS", // No keys accepted
    trial_duration: 2000 // Display for 2 seconds
  };

  /**
   * Create the timeline (Requirement 4: Followed by end message)
   */
  const timeline = [circle_trial, end_trial];

  /**
   * Run the experiment
   */
  jsPsych.run(timeline);
</script>
</html>
